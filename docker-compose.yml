services:
  mysql:
    image: mysql:8.4
    container_name: seckill-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: seckill
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - seckill-net

  redis:
    image: redis:7.4-alpine
    container_name: seckill-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - seckill-net

  app1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seckill-app1
    environment:
      SERVER_PORT: 8080
      APP_INSTANCE: app1
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/seckill?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - seckill-net

  app2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seckill-app2
    environment:
      SERVER_PORT: 8080
      APP_INSTANCE: app2
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/seckill?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8082:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - seckill-net

  nginx:
    image: nginx:1.27-alpine
    container_name: seckill-nginx
    environment:
      NGINX_LB_POLICY: "least_conn;"
    command: >
      /bin/sh -c
      "envsubst '$$NGINX_LB_POLICY' < /etc/nginx/templates/default.conf.template
      > /etc/nginx/conf.d/default.conf
      && nginx -g 'daemon off;'"
    volumes:
      - ./nginx/conf/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    ports:
      - "80:80"
    depends_on:
      - app1
      - app2
    networks:
      - seckill-net

volumes:
  mysql_data:

networks:
  seckill-net:
