server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/seckill?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      database: ${SPRING_DATA_REDIS_DATABASE:0}

mybatis:
  configuration:
    map-underscore-to-camel-case: true

app:
  instance-id: ${APP_INSTANCE:local}

cache:
  product:
    ttl-seconds: ${CACHE_PRODUCT_TTL_SECONDS:300}
    null-ttl-seconds: ${CACHE_PRODUCT_NULL_TTL_SECONDS:60}
    ttl-jitter-seconds: ${CACHE_PRODUCT_TTL_JITTER_SECONDS:120}
    lock-ttl-seconds: ${CACHE_PRODUCT_LOCK_TTL_SECONDS:10}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{instanceId}] %logger{36} - %msg%n"
  level:
    com.whu.distributed.seckill: debug
